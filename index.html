<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="icon" href="assets/avatar.png">
  <title>👋 Hi there</title>
</head>

<body>
  <div class="fake-cookie">
    <div class="fake-cookie-container">
      <div class="fake-cookie-img"><img src="assets/cookie.png"></div>
      <div class="fake-cookie-content">
        <h2>Cookies</h2>
        <p>Do you like cookies? Because this website doesn't contain any.<br>Do you accept non-existing cookies?</p>
        <div class="fake-cookie-buttons">
          <button>Yes</button>
          <button>No</button>
        </div>
      </div>
    </div>
  </div>

  <main>
    <section id="about">
      <div class="about">
        <div class="about-img">
          <img src="assets/avatar.png">
        </div>
        <div class="another-boring-class-name">
          <div class="about-text">
            <h2>👋 Hi, I'm AYnonyme.</h2>
            <p>I'm a <span id="typewrite"></span></p>
          </div>
          <div class="btns-like-its-just-boring-to-name-css-classes-idk-what-to-put-either-but-anyways">
            <a class="fab fa-github" href="https://github.com/AYn0nyme"></a>
            <a class="fab fa-discord" href="https://discord.com/users/943580965446512661"></a>
          </div>
        </div>

      </div>
    </section>
  </main>

  <script>
    document.querySelectorAll(".fake-cookie-buttons button").forEach(el => {
      el.addEventListener("click", (e) => {
        e.target.parentElement.parentElement.parentElement.parentElement.remove()
      })
    })
  </script>

  <script src="assets/typewrite.js" type="module"></script>
</body>

</html>
